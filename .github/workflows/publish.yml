name: Build and Publish

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build_test_publish:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore DevToys.Base64Url.sln

    - name: Build
      run: dotnet build DevToys.Base64Url.sln --configuration Release --no-restore

    - name: Test
      run: dotnet test DevToys.Base64Url.sln --configuration Release --no-build --verbosity normal

    # Only pack and publish when a tag is pushed
    - name: Pack
      if: startsWith(github.ref, 'refs/tags/v')
      env:
        TAG_NAME: ${{ github.ref_name }}
      run: |
        VERSION=${TAG_NAME#v}
        dotnet pack DevToys.Base64Url/DevToys.Base64Url.csproj --configuration Release --no-build --output ./nupkgs /p:Version=$VERSION

    - name: Publish to NuGet
      if: startsWith(github.ref, 'refs/tags/v')
      run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
